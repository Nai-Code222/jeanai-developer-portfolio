<!-- src/app/components/projects/projects.component.html -->
<section id="projects">
  <div class="section-inner">
    <p class="eyebrow" appReveal>Work</p>
    <h2 class="section-h" appReveal [revealDelay]="80">Selected <em>projects.</em></h2>

    <div class="projects-grid">
      <div
        class="pc"
        *ngFor="let project of projects; let i = index"
        appReveal
        [revealDelay]="i * 80"
      >
        <!-- Preview illustration -->
        <div class="pc-img" [ngClass]="['preview-' + project.previewType, project.screenshots?.length ? 'has-screenshots' : '']">
          <div *ngIf="project.screenshots?.length; else glyphPreview" class="screenshot-carousel">
            <div
              class="screenshot-row"
              [class.single]="project.screenshots!.length === 1"
              [class.web-row]="project.platform === 'Web'"
              #scrollEl
              (scroll)="onScroll($event, project.id)"
            >
              <img
                *ngFor="let shot of project.screenshots"
                [src]="shot"
                [alt]="project.title + ' screenshot'"
                class="screenshot-img"
                [class.web-shot]="project.platform === 'Web'"
              />
            </div>
            <div class="screenshot-dots" *ngIf="project.screenshots!.length > 1">
              <span
                *ngFor="let s of project.screenshots; let di = index"
                class="dot"
                [class.active]="activeIdx(project.id) === di"
                (click)="goTo(scrollEl, di, project.id)"
              ></span>
            </div>
          </div>
          <ng-template #glyphPreview>
            <div class="preview-inner">
              <span class="preview-glyph">{{ project.previewGlyph }}</span>
              <span class="preview-url">{{ project.previewLabel }}</span>
            </div>
          </ng-template>
        </div>

        <!-- Body -->
        <div class="pc-body">
          <div class="pc-pill-row">
            <div
              class="status-badge"
              [style.color]="badgeColor(project.status)"
              [style.background]="badgeBg(project.status)"
              [style.borderColor]="badgeColor(project.status) + '33'"
            >
              <span class="status-dot" [style.background]="badgeColor(project.status)"></span>
              {{ project.status }}
            </div>
            <span class="platform-badge">{{ project.platform }}</span>
          </div>

          <h3 class="pc-title">{{ project.title }}</h3>
          <p class="pc-desc">{{ project.description }}</p>

          <div class="pc-tags">
            <span class="pc-tag" *ngFor="let tag of project.tags">{{ tag }}</span>
          </div>
        </div>

        <!-- Footer links -->
        <div class="pc-footer">
          <a *ngIf="project.codeUrl" [href]="project.codeUrl" target="_blank" rel="noopener" class="pc-link">
            <i class="ti ti-brand-github"></i> Code
          </a>
          <a *ngIf="project.demoUrl" [href]="project.demoUrl" target="_blank" rel="noopener" class="pc-link">
            <i class="ti ti-external-link"></i> Live Demo
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
